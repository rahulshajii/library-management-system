<!DOCTYPE html>
<html lang="en">
<head>
    <title>Transactions | LibraryPro</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
            font-family: Arial, sans-serif;
        }

        .main-content {
            padding: 40px;
        }

        .table-card {
            background: white;
            border-radius: 18px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.06);
            padding: 25px;
        }

        .status-issued {
            background: #dbeafe;
            color: #1d4ed8;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 14px;
        }

        .status-returned {
            background: #dcfce7;
            color: #166534;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="main-content">
    <h2 class="mb-4">Transactions History</h2>

    <div class="table-card">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Member</th>
                    <th>Book</th>
                    <th>Due Date</th>
                    <th>Status</th>
                    <th>Fine</th>
                </tr>
            </thead>
            <tbody>
                {% for transaction in transactions %}
                <tr>
                    <td>{{ transaction.member.name }}</td>
                    <td>{{ transaction.book.title }}</td>
                    <td>{{ transaction.due_date }}</td>
                    <td>
                        {% if transaction.status == 'ISSUED' %}
                            <span class="status-issued">Issued</span>
                        {% else %}
                            <span class="status-returned">Returned</span>
                        {% endif %}
                    </td>
                    <td>₹{{ transaction.fine }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
