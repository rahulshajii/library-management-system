<!DOCTYPE html>
<html lang="en">
<head>
    <title>Members | LibraryPro</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
            font-family: Arial, sans-serif;
        }

        .main-content {
            padding: 40px;
        }

        .table-card {
            background: white;
            border-radius: 18px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.06);
            padding: 25px;
        }

        .status-active {
            background: #dcfce7;
            color: #166534;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 14px;
        }

        .status-inactive {
            background: #fee2e2;
            color: #991b1b;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="main-content">
    <h2 class="mb-4">Members Management</h2>

    <div class="table-card">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Membership ID</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for member in members %}
                <tr>
                    <td>{{ member.name }}</td>
                    <td>{{ member.id }}</td>
                    <td>
                        {% if member.membership_status == 'ACTIVE' %}
                            <span class="status-active">Active</span>
                        {% else %}
                            <span class="status-inactive">Inactive</span>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
