<!DOCTYPE html>
<html lang="en">
<head>
    <title>LibraryPro Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fb;
            font-family: Arial, sans-serif;
        }

        .sidebar {
            height: 100vh;
            background: #1e293b;
            color: white;
            padding: 30px 20px;
            position: fixed;
            width: 250px;
        }

        .sidebar h3 {
            margin-bottom: 40px;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .sidebar a:hover {
            color: white;
        }

        .main-content {
            margin-left: 270px;
            padding: 40px;
        }

        .stat-card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.06);
            padding: 25px;
            background: white;
        }

        .book-card {
            border: none;
            border-radius: 18px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.06);
            transition: 0.3s;
        }

        .book-card:hover {
            transform: translateY(-5px);
        }

        .search-box {
            background: white;
            padding: 20px;
            border-radius: 18px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.06);
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>LibraryPro</h3>
    <a href="#">Dashboard</a>
    <a href="#">Books</a>
    <a href="/members/">Members</a>
    <a href="/transactions/">Transactions</a>
</div>

<div class="main-content">

    <h2 class="mb-4">Dashboard Overview</h2>

    <div class="row mb-4">
        <div class="col-md-3">
            <div class="stat-card">
                <h5>Total Books</h5>
                <h2>{{ books|length }}</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <h5>Available</h5>
                <h2>{{ books|length }}</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <h5>Borrowed</h5>
                <h2>0</h2>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <h5>Members</h5>
                <h2>0</h2>
            </div>
        </div>
    </div>

    <div class="search-box mb-4">
        <form method="GET">
            <div class="input-group">
                <input type="text" name="search" class="form-control form-control-lg"
                       placeholder="Search books">
                <button class="btn btn-dark px-4">Search</button>
            </div>
        </form>
    </div>

    <div class="row">
        {% for book in books %}
        <div class="col-md-4 mb-4">
            <div class="card book-card p-3">
                <div class="card-body">
                    <h5 class="fw-bold">{{ book.title }}</h5>
                    <p>{{ book.author }}</p>
                    <p>{{ book.category }}</p>
                    <p>Available: {{ book.available_count }}</p>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
