<div class="container-fluid">

    <h2 class="mb-4">

        Books

    </h2>

    <table class="table table-bordered table-hover shadow">

        <thead class="table-dark">

            <tr>

                <th>ID</th>

                <th>Title</th>

                <th>Author</th>

                <th>Category</th>

                <th>Quantity</th>

                <th>Available</th>

            </tr>

        </thead>

        <tbody>

            <tr *ngFor="let book of books">

                <td>{{ book.id }}</td>

                <td>{{ book.title }}</td>

                <td>{{ book.author }}</td>

                <td>{{ book.category }}</td>

                <td>{{ book.quantity }}</td>

                <td>{{ book.available_count }}</td>

            </tr>

        </tbody>

    </table>

</div>
